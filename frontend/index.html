<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@4.5.0/dist/apexcharts.min.js" defer></script>
  <title>FinSight - Gerenciamento Financeiro</title>
  <link rel="stylesheet" href="style/main.css">
</head>

<body>
  <!-- Tela de loading do bootstrap: visivel ate o Auth decidir Login x App -->
  <div id="loading-screen" role="status" aria-live="polite" aria-label="Carregando FinSight">
    <div class="loading-box">
      <div class="loading-brand-row">
        <i class="fa-solid fa-chart-simple" aria-hidden="true"></i>
        <p class="loading-brand">FinSight</p>
      </div>
      <div class="loading-spinner" aria-hidden="true"></div>
    </div>
  </div>

  <!-- Containers da SPA — preenchidos apenas apos a autenticacao -->
  <div id="shell-root"></div>
  <main id="app" aria-live="polite" hidden></main>
  <div id="chrome-root"></div>
  <div id="modals-root"></div>

  <script type="module" src="./js/app/bootstrap.js"></script>
</body>

</html>
